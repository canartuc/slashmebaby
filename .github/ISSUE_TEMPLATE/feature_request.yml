name: Feature request
description: Suggest a new capability or a change to existing behavior.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What are you trying to do that SlashMeBaby currently can't, or makes harder than it should be? Describe the situation, not the solution.
      placeholder: "e.g. I often have 40+ tabs across three windows and can't tell which window a search result will jump to."
    validations:
      required: true
  - type: textarea
    id: proposed
    attributes:
      label: Proposed behavior
      description: What should the extension do? Be concrete: what would you press, and what would you see?
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other ways to solve the problem, including workarounds you use today, or why existing features don't cover it.
    validations:
      required: false
