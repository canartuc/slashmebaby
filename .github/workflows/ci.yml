name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-and-test:
    name: Type-check + unit + audit
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type-check
        run: npm run compile

      - name: Unit tests
        run: npx vitest run

      - name: Coverage
        run: npx vitest run --coverage
        continue-on-error: true

      - name: Upload coverage artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: coverage
          path: coverage/
          if-no-files-found: ignore

      - name: Dependency audit (high+)
        run: npm audit --audit-level=high

  build:
    name: Build extension bundles
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build Chrome MV3 bundle
        run: npm run build

      - name: Build Firefox MV2 bundle
        run: npm run build:firefox

      - name: Upload bundles
        uses: actions/upload-artifact@v7
        with:
          name: extension-bundles
          path: |
            .output/chrome-mv3/
            .output/firefox-mv2/
          if-no-files-found: error

  e2e:
    name: Playwright (Chrome via xvfb)
    runs-on: ubuntu-latest
    needs: lint-and-test
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v6
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install chromium --with-deps

      - name: Build extension for E2E
        run: npm run build

      - name: Run Playwright tests
        run: xvfb-run --auto-servernum npx playwright test

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          if-no-files-found: ignore
